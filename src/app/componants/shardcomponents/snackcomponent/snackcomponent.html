<!-- Toast container -->
<div
  class="toast-container app-toast-container p-3"
  style="position: fixed !important; top: 90px !important; right: 16px !important; bottom: auto !important; left: auto !important; z-index: 99999 !important;"
>
  <div
    id="liveToast"
    class="toast align-items-center text-white border-0"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <div class="d-flex">
      <div class="toast-body" id="toastMessage"></div>
      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
        aria-label="Close"
      ></button>
    </div>
  </div>
</div>
